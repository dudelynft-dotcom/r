# ROBARK traits — machine-readable mirror of TRAITS.md.
# Every option has a `prompt` fragment injected into the image prompt. The
# `style` + `negative` blocks force the hand-drawn, NON-AI look on every piece.

collection:
  name: "ROBARK"
  size: 10000

  # The base character — ALWAYS the exact same dog face (matches master art:
  # art-previews/master art/). Fluffy cream droopy-eared dog, sleepy deadpan face.
  # Pose follows OK-Guy: chest-up, facing viewer, casual thumbs-up, deadpan.
  base_character: >-
    a cartoon dog named ROBARK, always the exact same dog: fluffy cream and tan
    fur, soft droopy floppy ears with darker tan tips, a big round black nose, a
    rounded fuzzy muzzle, heavy half-closed sleepy tired eyes, a calm unbothered
    deadpan expression, a slightly raised eyebrow; shown from the chest up, facing
    the viewer, giving a casual thumbs-up with one rounded cartoon paw

  # THE STYLE LAW — OK-Guy hand-drawn comic. Same look on every piece. NOT AI.
  style: >-
    OK-Guy meme art style, clean bold even black outlines, flat bold colors with
    simple cel shading, hand-drawn indie comic look, full-bleed background with no
    border, limited clean palette, drawn by a human illustrator, NOT ai-generated,
    no airbrush, no smooth gradients, no photorealism, no 3d

  # Anti-AI + no-text negative. FLUX ignores negatives, so these are ALSO baked
  # into the positive prompt by the generator; kept here for models that use them.
  negative: >-
    smooth gradients, airbrush, soft shading, 3d render, photorealistic, glossy,
    digital sheen, perfect symmetry, ai-generated look, octane render, cinematic
    lighting, blurry, painterly, text, words, letters, numbers, signs, logo,
    watermark, signature, extra characters

layers:
  - name: Background
    weights:
      # plain panels (commons) — clean flat color behind the character
      - { value: "Plain Cream", weight: 7, prompt: "a plain flat cream studio background inside the comic panel, no text" }
