      - { value: "Blunt", weight: 12, prompt: "a blunt with smoke in his mouth" }
      - { value: "Toothpick", weight: 10, prompt: "a toothpick in his mouth" }
      - { value: "Vape", weight: 9, prompt: "a vape with a puff cloud" }
      - { value: "Pipe", weight: 8, prompt: "a smoking pipe in his mouth" }
