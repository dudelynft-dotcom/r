  - name: Background
    weights:
      - { value: "Plain Color", weight: 10, prompt: "a plain flat pastel studio background" }
      - { value: "Degen Room", weight: 12, prompt: "a detailed dim degen room with a glowing monitor and clutter" }
      - { value: "Dim Bar", weight: 10, prompt: "a detailed dim neon bar with bottles" }
      - { value: "Office Desk", weight: 9, prompt: "a detailed office with a desk and a screen" }
      - { value: "Casino Floor", weight: 8, prompt: "a detailed neon casino floor with chips" }
      - { value: "Neon City Night", weight: 8, prompt: "a detailed neon city skyline at night" }
      - { value: "Trading Desk", weight: 8, prompt: "a detailed trading desk with red candle charts on screens, no numbers" }
      - { value: "Money Rain", weight: 6, prompt: "a detailed scene of cash raining down" }
      - { value: "Rooftop Night", weight: 6, prompt: "a detailed rooftop at night under stars" }
      - { value: "Sunset Beach", weight: 5, prompt: "a detailed sunset beach with palm trees" }
      - { value: "Graveyard Night", weight: 4, prompt: "a detailed spooky graveyard at night" }
      - { value: "Outer Space", weight: 4, prompt: "a detailed outer space scene with planets and stars" }
      - { value: "Vaporwave", weight: 3, prompt: "a detailed vaporwave grid sunset, pink and purple" }
      - { value: "Heaven Clouds", weight: 2, prompt: "a detailed dreamy sky of golden clouds" }
